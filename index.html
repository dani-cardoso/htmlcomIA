<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML com IA</title>
    <style>
        /* Reset básico para evitar comportamentos inesperados entre navegadores */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }

        .hero-banner {
            width: 100%;
            height: 100vh;
            /* Shorthand para background e fallback de cor (importante para acessibilidade) */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('minecraftimg.gif') no-repeat center center / cover;
            
            /* Centralização Moderna com Flexbox */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            text-align: center;
            color: #ffcc00; /* Amarelo mais legível e profissional */
            padding: 20px;
        }

        .hero-banner h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .hero-banner p {
            font-size: 1.25rem;
            max-width: 600px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>

    <header class="hero-banner">
        <h1>Teste de Background</h1>
        <p>Demonstração técnica de como implementar um banner responsivo utilizando CSS moderno e boas práticas de design.</p>
    </header>

</body>
</html>
